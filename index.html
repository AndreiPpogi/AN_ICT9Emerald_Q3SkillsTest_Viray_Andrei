<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q3 Seatwork 2</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Internal CSS */

body{
    background-image:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
    background-size:cover;
    background-position:center;
    font-family:Arial;
}

.form-box{
    background:rgba(0, 200, 255,0.3);
    padding:30px;
    border-radius:15px;
    width:350px;
    margin:auto;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    display:block;
    margin:auto;
}

footer{
    text-align:center;
    color:white;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container mt-5">

<div class="form-box">

<h2 class="text-center">REGISTRATION</h2>

<p>Please fill out all required fields in the registration form with accurate information.</p>


<img src="https://i.imgur.com/0y0y0y0.png" id="profilePic" class="profile">

<br>

<input type="file" id="photo" class="form-control">

<button class="btn btn-info w-100 mt-2" onclick="uploadPhoto()">Upload Photo</button>


<br><br>

<input type="text" id="fname" class="form-control" placeholder="First Name">

<br>

<input type="text" id="lname" class="form-control" placeholder="Last Name">

<br>

<input type="number" id="age" class="form-control" placeholder="Age">

<br>

<input type="text" id="contact" class="form-control" placeholder="Contact Number">

<br>

<input type="email" id="email" class="form-control" placeholder="Email">

<br>

<input type="text" id="username" class="form-control" placeholder="Enter username">

<br>

<input type="password" id="password" class="form-control" placeholder="Enter password">

<br>

<div class="form-check">
<input type="checkbox" class="form-check-input" id="terms">
<label class="form-check-label">
I accept the Terms of Use and Privacy Policy
</label>
</div>

<br>

<button class="btn btn-primary w-100" onclick="register()">Create my account</button>

<br><br>

<button class="btn btn-secondary w-100" onclick="cancelForm()">Cancel</button>

<br><br>

<p style="font-size:12px">
Background from 
<a href="https://unsplash.com" target="_blank">Unsplash</a>
</p>

</div>
</div>

<footer>
Student Name | Grade & Section ©2026
</footer>

<script>

let fname, lname, age;

function uploadPhoto(){

let fileInput = document.getElementById("photo");
let profile = document.getElementById("profilePic");

if(fileInput.files.length > 0){

profile.src = URL.createObjectURL(fileInput.files[0]);

alert("Your profile pic has been uploaded.");

}else{

alert("Please choose a photo first.");

}

}


function register(){

fname = document.getElementById("fname").value;
lname = document.getElementById("lname").value;
age = document.getElementById("age").value;

let terms = document.getElementById("terms").checked;

if(fname == "" || lname == "" || age == ""){

alert("Please complete the form.");

}
else if(!terms){

alert("Please accept the Terms and Privacy Policy.");

}
else{

alert("To register, click OK");

}

}

function cancelForm(){

document.getElementById("fname").value="";
document.getElementById("lname").value="";
document.getElementById("age").value="";
document.getElementById("contact").value="";
document.getElementById("email").value="";
document.getElementById("username").value="";
document.getElementById("password").value="";

alert("Form cleared.");

}

</script>

</body>
</html>
